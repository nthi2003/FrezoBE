services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: frezo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: frezo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Consul (config center) ──────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.18
    container_name: frezo-consul
    command: >
      agent -server -bootstrap -ui 
      -bind=0.0.0.0 -client=0.0.0.0 
      -data-dir=/consul/data
    ports:
      - "8500:8500"   # Consul UI → http://localhost:8500
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Consul Configuration Loader ───────────────────────────────────────────────
  consul-config-loader:
    image: hashicorp/consul:1.18
    container_name: frezo-consul-config-loader
    depends_on:
      consul:
        condition: service_healthy
    volumes:
      - ./init-consul.sh:/init-consul.sh
    entrypoint: ["sh", "/init-consul.sh"]

  # ─── MinIO (object storage) ───────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: frezo-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ──────────────────────────────────────────────────────
  app:
    build: .
    container_name: frezo-server
    depends_on:
      consul:
        condition: service_healthy
      consul-config-loader:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "7410:7410"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: frezo
      DB_USER: postgres
      DB_PASS: postgres
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_SECURITY_ENCRYPTION_KEY: ${APP_SECURITY_ENCRYPTION_KEY:-CHANGE_ME_PLEASE_32PLUS_CHARS_123456}

  # ─── AI Service (FastAPI) ─────────────────────────────────────────────────────
  ai:
    build:
      context: ../FrezoAI
    container_name: frezo-ai
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"

  # ─── Spring Cloud Gateway ────────────────────────────────────────────────────
  gateway:
    build:
      context: ../FrezoGW
    container_name: frezo-gateway
    depends_on:
      consul:
        condition: service_healthy
      consul-config-loader:
        condition: service_completed_successfully
      app:
        condition: service_started
    ports:
      - "7200:7200"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      SPRING_PROFILES_ACTIVE: docker

volumes:
  consul-data:
  minio-data:
  postgres-data:

networks:
  default:
    name: frezo-network
    driver: bridge
