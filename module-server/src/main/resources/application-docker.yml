spring:
  config:
    import: "optional:consul:"

  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        format: yaml
        watch:
          enabled: true
      discovery:
        enabled: true
        register: true
        instance-id: frezo-server-${spring.cloud.client.hostname:localhost}
        service-name: frezo-server
        prefer-ip-address: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:frezo}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  cloud:
    consul:
      host: ${CONSUL_HOST:consul}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        watch:
          enabled: true
      discovery:
        enabled: true
        register: true

minio:
  url: http://${MINIO_HOST:minio}:${MINIO_PORT:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:frezo-files}
